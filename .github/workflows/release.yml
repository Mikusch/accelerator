name: Release

on:
  workflow_dispatch:
  push:
    branches: [ master, release_ci ]

jobs:
  main-ci:
    uses: ./.github/workflows/ci.yml
    with:
      release: true

  release:
    permissions: write-all
    runs-on: ubuntu-latest
    needs: [ main-ci ]

    env:
      PROJECT: 'accelerator'
    steps:
      - run: sudo apt-get install -y tree

      - uses: actions/checkout@v7
        name: Repository checkout
        with:
          fetch-depth: 0
          path: repository
      
      - name: Download Linux release
        uses: actions/download-artifact@v8
        with:
          name: accelerator_linux
          path: linux

      - name: Download Windows release
        uses: actions/download-artifact@v8
        with:
          name: accelerator_windows
          path: windows

      - name: Compute release name
        id: release_name
        run: |
          cd repository
          read -r PRODUCT_VERSION < ./product.version
          REV_COUNT=$(git rev-list --count HEAD)
          REV_SHA=$(git rev-parse --short HEAD)
          echo "name=${{ env.PROJECT }}-${PRODUCT_VERSION}-git${REV_COUNT}-${REV_SHA}" >> "$GITHUB_OUTPUT"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.release_name.outputs.name }}-windows
          path: windows

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.release_name.outputs.name }}-linux
          path: linux
